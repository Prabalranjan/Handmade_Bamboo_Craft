<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Product | Handmade Bamboo Craft</title>
<meta name="description" id="pageMetaDesc" content="Handcrafted bamboo product from Handmade Bamboo Craft, Assam.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="nav-container">
    <a href="index.html#home" class="logo">Handmade <span>Bamboo</span> Craft</a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html#shop">Shop</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <button class="icon-btn" id="cartToggle" aria-label="Open cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.5 2.5h2l2.4 12.2a2 2 0 0 0 2 1.6h8.2a2 2 0 0 0 2-1.6L21 6.5H6"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="wrap">
  <p class="breadcrumb"><a href="index.html#home">Home</a> / <a href="index.html#shop">Shop</a> / <span id="breadcrumbName">Product</span></p>

  <div class="product-detail" id="productDetail">
    <!-- filled in by script -->
  </div>
</div>

<footer>
  <div class="wrap">
    <p>&copy; 2026 Handmade Bamboo Craft. All rights reserved.</p>
  </div>
</footer>

<div class="cart-overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="cart-close" id="cartClose" aria-label="Close cart">&times;</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-subtotal"><span>Subtotal</span><span id="cartSubtotal">₹0</span></div>
    <button class="btn-primary btn-block" id="checkoutBtn">Order via WhatsApp</button>
    <p class="cart-note">You'll be redirected to WhatsApp to confirm your order with us directly.</p>
  </div>
</aside>

<script src="products.js"></script>
<script src="cart.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id");
  const product = products.find(p => p.id === productId) || products[0];

  document.getElementById("pageTitle").textContent = `${product.name} | Handmade Bamboo Craft`;
  document.getElementById("pageMetaDesc").setAttribute("content", product.desc);
  document.getElementById("breadcrumbName").textContent = product.name;

  let activeImageIndex = 0;

  function renderDetail(){
    const images = product.images && product.images.length ? product.images : [product.image];
    const d = PRODUCT_DESCRIPTION;

    document.getElementById("productDetail").innerHTML = `
      <div class="product-gallery">
        <div class="gallery-main"><img id="galleryMainImg" src="${images[activeImageIndex]}" alt="${product.name}"></div>
        <div class="gallery-thumbs" id="galleryThumbs">
          ${images.map((src, i) => `
            <button type="button" class="${i === activeImageIndex ? "active" : ""}" data-index="${i}">
              <img src="${src}" alt="${product.name} photo ${i + 1}" loading="lazy">
            </button>
          `).join("")}
        </div>
      </div>
      <div class="product-info">
        <h1>${product.name}</h1>
        <div class="detail-price">${formatPrice(product.price)}</div>
        <p class="detail-short-desc">${product.desc}</p>
        <div class="detail-actions">
          <div class="detail-qty">
            <button type="button" id="qtyMinus">&minus;</button>
            <span id="qtyValue">1</span>
            <button type="button" id="qtyPlus">+</button>
          </div>
          <button class="btn-primary" id="addToCartBtn" data-label="Add to Cart">Add to Cart</button>
        </div>

        <div class="description-block">
          <h2>Overview</h2>
          <p>${d.overview}</p>

          <h2>Key Features</h2>
          <ul>${d.features.map(f => `<li>${f}</li>`).join("")}</ul>

          <h2>Specifications</h2>
          <ul>${d.specs.map(s => `<li>${s}</li>`).join("")}</ul>
        </div>
      </div>
    `;

    document.getElementById("galleryThumbs").addEventListener("click", e => {
      const btn = e.target.closest("button[data-index]");
      if(!btn) return;
      activeImageIndex = Number(btn.dataset.index);
      document.getElementById("galleryMainImg").src = images[activeImageIndex];
      document.querySelectorAll("#galleryThumbs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });

    let qty = 1;
    let addedTimeout = null;
    const qtyValue = document.getElementById("qtyValue");
    const addToCartBtn = document.getElementById("addToCartBtn");

    function resetAddButton(){
      if(addedTimeout){ clearTimeout(addedTimeout); addedTimeout = null; }
      addToCartBtn.textContent = addToCartBtn.dataset.label;
      addToCartBtn.classList.remove("added");
    }

    document.getElementById("qtyMinus").addEventListener("click", () => {
      qty = Math.max(1, qty - 1);
      qtyValue.textContent = qty;
      resetAddButton();
    });
    document.getElementById("qtyPlus").addEventListener("click", () => {
      qty += 1;
      qtyValue.textContent = qty;
      resetAddButton();
    });
    addToCartBtn.addEventListener("click", e => {
      for(let i = 0; i < qty; i++) addToCart(product.id);
      const btn = e.currentTarget;
      const original = btn.dataset.label;
      btn.textContent = "Added to Cart";
      btn.classList.add("added");
      addedTimeout = setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove("added");
        addedTimeout = null;
      }, 1200);
    });
  }

  renderDetail();
  initCartWidget();
</script>

</body>
</html>
